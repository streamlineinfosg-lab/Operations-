<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackGrid OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Check-in screen -->
    <div id="screen-checkin" class="screen active">
        <div class="checkin-wrap">
            <p class="checkin-greeting" id="checkin-greeting">Good morning</p>
            <h1 class="serif">Who's on desk today?</h1>
            <div class="checkin-groups" id="checkin-groups"></div>
        </div>
    </div>

    <!-- PIN screen -->
    <div id="screen-pin" class="screen">
        <div class="pin-wrap">
            <button class="link-back" id="pin-back" type="button">&lt; Back</button>
            <h2 class="serif" id="pin-name"></h2>
            <p id="pin-title"></p>
            <div class="pin-dots" id="pin-dots">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="pin-pad" id="pin-pad"></div>
            <p class="pin-error" id="pin-error"></p>
        </div>
    </div>

    <!-- Main app -->
    <div id="app-layout">
        <nav id="nav-rail">
            <div class="nav-brand serif">BlackGrid<span>.</span></div>
            <div class="nav-items" id="nav-items"></div>
            <div class="nav-footer">
                <div class="nav-user" id="nav-user"></div>
                <button class="nav-link" id="change-pin-btn" type="button">Change PIN</button>
                <button class="nav-link" id="logout-btn" type="button">Switch user</button>
            </div>
        </nav>

        <main id="main-content">
            <section id="page-dashboard" class="page"></section>
            <section id="page-clients" class="page"></section>
            <section id="page-calendar" class="page"></section>
            <section id="page-tasks" class="page"></section>
            <section id="page-deliverables" class="page"></section>
            <section id="page-library" class="page"></section>
            <section id="page-studio" class="page"></section>
            <section id="page-accounting" class="page"></section>
            <section id="page-admin" class="page"></section>
        </main>
    </div>

    <div id="modal-container"></div>
    <div id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
